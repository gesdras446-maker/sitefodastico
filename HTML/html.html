<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shinigame</title>
    <link rel="stylesheet" href="../CSS/css.css">
</head>

<body>

    <header class="navbar">
        <h1 class="title">Kyōkotsu</h1>
    </header>
    <div class="links">
        <a href="fazendo.html">Sendo Realizado</a>
        <a href="Pronto.html">Realizado</a>
    </div>

    <div class="avatar">tabela de serviços</div>

    <div class="group">
        <div class="card">
            <span>HTML</span>
            <span>preço por hora R$: 45,00</span>
        </div>
        <div class="card">
            <span>CSS</span>
            <span>Preço por hora R$: 65,00</span>
        </div>
        <div class="card">
            <span>JavaScript</span>
            <span>Preço por hora R$: 80,00</span>
        </div>
        <div class="card">
            <span>Backend</span>
            <span>Preço por hora R$: 120,00</span>
        </div>
    </div>

    <div class="servicos-container">
        <div class="avatar">Novos Serviços</div>
        <div class="botoes-grupo">
            <button class="btn serv-html" onclick="abrirPopup('HTML', 'R$: 45,00')">HTML</button>
            <button class="btn serv-css" onclick="abrirPopup('CSS', 'R$: 65,00')">CSS</button>
            <button class="btn serv-back" onclick="abrirPopup('Backend', 'R$: 120,00')">Backend</button>
            <button class="btn serv-js" onclick="abrirPopup('JavaScript', 'R$: 80,00')">JS</button>
        </div>
    </div>

    <div id="meuPopupe" class="modal">
        <div class="modal-content">
            <h3>Adicionar Atividade</h3>
            <form id="atividadeForm">
                <label for="nomeEmpresa">Nome da Empresa:</label>
                <input type="text" id="nomeEmpresa" name="nomeEmpresa" placeholder="Ex: Google, Netflix..." required>

                <label for="dataEntrega">Data da Entrega:</label>
                <input type="date" id="dataEntrega" name="dataEntrega" required>

                <label for="tempo">Horas:</label>
                <input type="number" id="tempo" name="tempo" min="1" placeholder="Ex: 10" required>

                <label for="valor">Valor por hora:</label>
                <input type="text" id="valor" name="valor" readonly required>

                <button type="submit" class="btn-adicionar">Adicionar Atividade</button>
                <button type="button" class="Urgent" onclick="adicionarUrgente(1.2)">Urgente (+20%)</button>
                <button type="button" class="Urgent-muito" onclick="adicionarUrgente(1.5)">Muito Urgente (+50%)</button>
            </form>
            <button class="btn-fechar" onclick="fechar()">Fechar</button>
        </div>
    </div>
    <footer>
        ©2026 Todos os direitos reservados.
    </footer>
    <script src="../JS/js.js"></script>
</body>

</html>
